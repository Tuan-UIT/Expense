<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0D1117" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://cdn.jsdelivr.net; connect-src https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src https://accounts.google.com;"
    />
    <title>💸 Chi Tiêu</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <h1 class="header-title" onclick="showPage('home')" role="button" tabindex="0">💸 Chi <span>Tiêu</span></h1>
      <button class="sync-btn" id="syncBtn" onclick="handleSyncClick()">
        <span id="syncIcon">☁️</span>
        <span id="syncLabel">Đồng bộ</span>
      </button>
    </div>

    <!-- PAGE: HOME -->
    <div id="pageHome">
      <!-- Summary cards: Today | Month Expense -->
      <div class="summary">
        <div class="sum-card">
          <div class="label">Hôm nay</div>
          <div class="amount today" id="todayTotal">0₫</div>
          <div class="count" id="todayCount">0 khoản</div>
        </div>
        <div class="sum-card">
          <div class="label">Chi tháng này</div>
          <div class="amount" id="monthTotal">0₫</div>
          <div class="count" id="monthCount">0 khoản</div>
        </div>
      </div>

      <!-- Income card -->
      <div class="summary" style="padding-top: 10px">
        <div class="sum-card">
          <div class="label">Thu tháng này</div>
          <div class="amount income" id="monthIncome">0₫</div>
          <div class="count" id="incomeCount">0 khoản</div>
        </div>
        <div class="sum-card">
          <div class="label">Còn lại <span id="savingsBadge"></span></div>
          <div class="amount balance-pos" id="balanceAmount">0₫</div>
          <div class="count" id="savingsRate">Chưa có thu nhập</div>
        </div>
      </div>

      <!-- Category bars -->
      <div class="cat-section" id="catSection" style="display: none">
        <div class="sec-title">Tháng này theo danh mục</div>
        <div class="cat-bars" id="catBars"></div>
      </div>

      <!-- Filter chips -->
      <div class="filter-bar" id="filterBar">
        <button
          class="chip active"
          data-cat="All"
          onclick="setFilter('All', this)"
        >
          Tất cả
        </button>
        <button
          class="chip income-chip"
          data-cat="__income__"
          onclick="setFilter('__income__', this)"
        >
          💚 Thu nhập
        </button>
        <button
          class="chip"
          data-cat="🍜 Ăn uống"
          onclick="setFilter('🍜 Ăn uống', this)"
        >
          🍜 Ăn uống
        </button>
        <button
          class="chip"
          data-cat="🛵 Di chuyển"
          onclick="setFilter('🛵 Di chuyển', this)"
        >
          🛵 Di chuyển
        </button>
        <button
          class="chip"
          data-cat="🛍️ Mua sắm"
          onclick="setFilter('🛍️ Mua sắm', this)"
        >
          🛍️ Mua sắm
        </button>
        <button
          class="chip"
          data-cat="💡 Hóa đơn"
          onclick="setFilter('💡 Hóa đơn', this)"
        >
          💡 Hóa đơn
        </button>
        <button
          class="chip"
          data-cat="💊 Sức khỏe"
          onclick="setFilter('💊 Sức khỏe', this)"
        >
          💊 Sức khỏe
        </button>
        <button
          class="chip"
          data-cat="📦 Khác"
          onclick="setFilter('📦 Khác', this)"
        >
          📦 Khác
        </button>
      </div>

      <div class="list-section" id="expenseList"></div>
    </div>

    <!-- PAGE: STATS -->
    <div id="pageStats" class="hidden">
      <div class="page" id="statsContent"></div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
      <button class="nav-item active" id="navHome" onclick="showPage('home')">
        <span class="nav-icon">📋</span>Giao dịch
      </button>
      <button class="fab" id="fabBtn" onclick="toggleFab()">＋</button>
      <button class="nav-item" id="navStats" onclick="showPage('stats')">
        <span class="nav-icon">📊</span>Thống kê
      </button>
    </div>

    <!-- FAB MENU (above overlay so tap is captured) -->
    <div class="fab-menu" id="fabMenu">
      <button class="fab-action income-action" onclick="openIncomeSheet()">
        <span class="fa-icon">💚</span> Thêm thu nhập
      </button>
      <button class="fab-action expense-action" onclick="openAddSheet()">
        <span class="fa-icon">💸</span> Thêm chi tiêu
      </button>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="handleOverlayClick(event)"></div>

    <!-- ADD EXPENSE SHEET -->
    <div class="sheet" id="addSheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <h2 id="addSheetTitle">💸 Thêm chi tiêu</h2>

      <div class="field">
        <label>Số tiền</label>
        <div class="amount-wrap">
          <input
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            id="inputAmount"
            placeholder="0"
            autocomplete="off"
          />
          <span class="currency">₫</span>
        </div>
        <div class="suggestions" id="suggestions"></div>
      </div>

      <div class="field">
        <label>Danh mục</label>
        <div class="cat-grid" id="catGrid"></div>
      </div>

      <div class="field">
        <label>Ghi chú</label>
        <input
          type="text"
          id="inputNote"
          placeholder="Mô tả ngắn…"
          maxlength="80"
          autocomplete="off"
        />
      </div>

      <div class="field">
        <label>Ngày</label>
        <input type="date" id="inputDate" />
      </div>

      <button class="add-btn" id="addSubmitBtn" onclick="addExpense()">
        Thêm chi tiêu
      </button>
    </div>

    <!-- ADD INCOME SHEET -->
    <div
      class="sheet income-sheet"
      id="incomeSheet"
      onclick="event.stopPropagation()"
    >
      <div class="sheet-handle"></div>
      <h2 class="income-title" id="incomeSheetTitle">💚 Thêm thu nhập</h2>

      <div class="field">
        <label>Số tiền</label>
        <div class="amount-wrap">
          <input
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            id="inputIncomeAmount"
            placeholder="0"
            autocomplete="off"
          />
          <span class="currency">₫</span>
        </div>
        <div class="suggestions" id="incomeSuggestions"></div>
      </div>

      <div class="field">
        <label>Nguồn thu</label>
        <div class="cat-grid" id="incomeCatGrid"></div>
      </div>

      <div class="field">
        <label>Ghi chú</label>
        <input
          type="text"
          id="inputIncomeNote"
          placeholder="Mô tả ngắn…"
          maxlength="80"
          autocomplete="off"
        />
      </div>

      <div class="field">
        <label>Ngày</label>
        <input type="date" id="inputIncomeDate" />
      </div>

      <button
        class="add-btn"
        id="incomeSubmitBtn"
        style="background: var(--green)"
        onclick="addIncome()"
      >
        Thêm thu nhập
      </button>
    </div>

    <!-- AUTH SHEET -->
    <div class="sheet" id="authSheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="auth-sheet">
        <div class="logo">☁️</div>
        <h3>Đồng bộ Google Drive</h3>
        <p>
          Đăng nhập để lưu dữ liệu lên Google Drive.<br />Dữ liệu chỉ lưu trong
          tài khoản của bạn.
        </p>
        <button class="manual-login-btn" onclick="startLogin()">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path
              fill="#fff"
              d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"
            />
            <path
              fill="#fff"
              d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"
            />
            <path
              fill="#fff"
              d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"
            />
            <path
              fill="#fff"
              d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.97 13.04C2.45 15.98 5.48 18 9 18z"
            />
          </svg>
          Đăng nhập với Google
        </button>
      </div>
    </div>

    <!-- CUSTOM CONFIRM DIALOG — z-index 600, always on top -->
    <div class="confirm-backdrop" id="confirmDialog">
      <div class="confirm-box" onclick="event.stopPropagation()">
        <p class="confirm-msg" id="confirmMsg"></p>
        <div class="confirm-actions">
          <button class="confirm-btn cancel" onclick="confirmCancel()">
            Hủy
          </button>
          <button class="confirm-btn ok" onclick="confirmOk()">Xóa</button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
