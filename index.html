<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0D1117" />
    <title>💸 Chi Tiêu</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --card: #1c2230;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --green: #3fb950;
        --red: #f85149;
        --yellow: #d29922;
        --blue: #58a6ff;
        --radius: 14px;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bot: env(safe-area-inset-bottom, 0px);
      }

      /* FIX #11: global touch-action stops double-tap zoom on all interactive elements */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      button,
      [role="button"],
      .chip,
      .nav-item,
      .cat-btn,
      .expense-item {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 15px;
        min-height: 100dvh;
        padding-bottom: calc(72px + var(--safe-bot));
        overscroll-behavior: none;
      }

      /* ── HEADER ────────────────────────────────────── */
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: calc(var(--safe-top) + 14px) 16px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 50; /* below overlay */
      }
      .header h1 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      .header h1 span {
        color: var(--green);
      }

      .sync-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        min-height: 36px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .sync-btn.synced {
        color: var(--green);
        border-color: var(--green);
      }
      .sync-btn.syncing {
        color: var(--yellow);
        border-color: var(--yellow);
      }
      .sync-btn.error {
        color: var(--red);
        border-color: var(--red);
      }

      /* ── SUMMARY CARDS ─────────────────────────────── */
      .summary {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 14px 16px;
      }
      .sum-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px;
      }
      .sum-card .label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 6px;
      }
      .sum-card .amount {
        font-size: 18px;
        font-weight: 700;
        color: var(--red);
      }
      .sum-card .amount.today {
        color: var(--yellow);
      }
      .sum-card .count {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }

      /* ── CATEGORY BARS ─────────────────────────────── */
      .cat-section {
        padding: 0 16px 10px;
      }
      .cat-section .sec-title {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }
      .cat-bars {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .cat-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .cat-row .cat-label {
        width: 80px;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cat-row .bar-track {
        flex: 1;
        background: var(--border);
        border-radius: 4px;
        height: 6px;
        overflow: hidden;
      }
      .cat-row .bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s ease;
      }
      .cat-row .cat-pct {
        font-size: 11px;
        color: var(--muted);
        width: 32px;
        text-align: right;
      }

      /* ── FILTER CHIPS ──────────────────────────────── */
      .filter-bar {
        display: flex;
        gap: 7px;
        padding: 8px 16px 12px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filter-bar::-webkit-scrollbar {
        display: none;
      }

      /* FIX #3: chip is a <button> now, min touch target 44px height */
      .chip {
        flex-shrink: 0;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 20px;
        padding: 0 14px;
        height: 36px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .chip.active {
        background: var(--green);
        border-color: var(--green);
        color: #000;
        font-weight: 600;
      }

      /* ── EXPENSE LIST ──────────────────────────────── */
      .list-section {
        padding: 0 16px;
      }
      .day-group {
        margin-bottom: 16px;
      }
      .day-label {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
      }
      .day-label span:last-child {
        color: var(--red);
        font-weight: 600;
      }

      .expense-item {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
      }
      .exp-icon {
        font-size: 22px;
        flex-shrink: 0;
      }
      .exp-info {
        flex: 1;
        min-width: 0;
      }
      .exp-note {
        font-size: 14px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .exp-meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .exp-amount {
        font-size: 15px;
        font-weight: 700;
        color: var(--red);
        white-space: nowrap;
      }

      /* FIX #5: del-btn touch target min 44×44px */
      .del-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 16px;
        cursor: pointer;
        padding: 10px;
        flex-shrink: 0;
        min-width: 44px;
        min-height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      .del-btn:active {
        color: var(--red);
        background: rgba(248, 81, 73, 0.1);
      }

      .empty-state {
        text-align: center;
        color: var(--muted);
        padding: 48px 24px;
      }
      .empty-state .icon {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .empty-state p {
        font-size: 14px;
        line-height: 1.6;
      }

      /* ── BOTTOM BAR ────────────────────────────────── */
      /* FIX #1: z-index 400 > overlay (200) so bar is always tappable */
      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 8px 16px calc(var(--safe-bot) + 8px);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 400;
      }

      /* FIX #6: nav-item is a <button>, min 44px touch target */
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        font-size: 10px;
        color: var(--muted);
        cursor: pointer;
        min-width: 64px;
        min-height: 44px;
        padding: 4px 8px;
        border-radius: 10px;
        background: none;
        border: none;
        font-family: inherit;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        justify-content: center;
      }
      .nav-item .nav-icon {
        font-size: 20px;
      }
      .nav-item.active {
        color: var(--green);
      }

      .fab {
        width: 54px;
        height: 54px;
        background: var(--green);
        border: none;
        border-radius: 50%;
        font-size: 28px;
        color: #000;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 16px rgba(63, 185, 80, 0.4);
        margin-top: -20px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        flex-shrink: 0;
      }
      .fab:active {
        transform: scale(0.92);
      }

      /* ── OVERLAY ───────────────────────────────────── */
      /* z-index 200 — sits above content (z50) but below bottom-bar (z400) */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        z-index: 200;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        /* FIX #9: stop overlay scroll from propagating */
        touch-action: none;
      }
      .overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      /* ── BOTTOM SHEET ──────────────────────────────── */
      .sheet {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        border-radius: 20px 20px 0 0;
        padding: 0 16px calc(var(--safe-bot) + 28px);
        z-index: 300;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        max-height: 90dvh;
        overflow-y: auto;
        /* FIX #7: smooth scroll on iOS */
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }
      .sheet.open {
        transform: translateY(0);
      }

      /* FIX #9: prevent sheet scroll from closing overlay */
      .sheet {
        touch-action: pan-y;
      }

      .sheet-handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 14px auto 20px;
        flex-shrink: 0;
      }
      .sheet h2 {
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 20px;
      }

      /* ── FORM FIELDS ───────────────────────────────── */
      .field {
        margin-bottom: 18px;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      .field input,
      .field select {
        width: 100%;
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        padding: 13px 14px;
        font-size: 16px; /* prevents iOS auto-zoom */
        font-family: inherit;
        outline: none;
        -webkit-appearance: none;
        appearance: none;
        transition: border-color 0.15s;
      }
      .field input:focus,
      .field select:focus {
        border-color: var(--green);
      }
      .field input::placeholder {
        color: var(--muted);
      }

      .amount-wrap {
        position: relative;
      }
      .amount-wrap .currency {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 14px;
        pointer-events: none;
      }
      .amount-wrap input {
        padding-right: 42px;
      }

      /* FIX #4: cat-btn is a <button>, min 44px */
      .cat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .cat-btn {
        background: var(--card);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 12px 6px;
        cursor: pointer;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        font-family: inherit;
        min-height: 64px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        transition:
          border-color 0.15s,
          color 0.15s,
          background 0.15s;
      }
      .cat-btn .emoji {
        font-size: 22px;
      }
      .cat-btn.selected {
        border-color: var(--green);
        color: var(--green);
        background: rgba(63, 185, 80, 0.08);
      }

      .add-btn {
        width: 100%;
        background: var(--green);
        border: none;
        border-radius: 12px;
        color: #000;
        font-size: 16px;
        font-weight: 700;
        padding: 16px;
        cursor: pointer;
        margin-top: 8px;
        font-family: inherit;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        min-height: 52px;
      }
      .add-btn:active {
        opacity: 0.85;
      }

      /* ── STATS PAGE ────────────────────────────────── */
      .page {
        padding: 0 16px;
      }
      .stats-title {
        font-size: 16px;
        font-weight: 700;
        padding: 16px 0 12px;
      }
      .stat-block {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        margin-bottom: 12px;
      }
      .stat-block .block-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
      }
      .stat-row:last-child {
        border-bottom: none;
      }
      .stat-row .sr-left {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      .stat-row .sr-right {
        font-size: 14px;
        font-weight: 600;
        color: var(--red);
      }

      /* ── AUTH SHEET ────────────────────────────────── */
      .auth-sheet {
        text-align: center;
        padding-top: 8px;
      }
      .auth-sheet .logo {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .auth-sheet h3 {
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .auth-sheet p {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 20px;
        line-height: 1.6;
      }
      #g_id_signin_btn {
        display: flex;
        justify-content: center;
      }

      /* ── TOAST ─────────────────────────────────────── */
      .toast {
        position: fixed;
        top: calc(var(--safe-top) + 64px);
        left: 50%;
        transform: translateX(-50%) translateY(-6px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 13px;
        white-space: nowrap;
        z-index: 500;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .toast.success {
        border-color: var(--green);
        color: var(--green);
      }
      .toast.error {
        border-color: var(--red);
        color: var(--red);
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <h1>💸 Chi <span>Tiêu</span></h1>
      <button class="sync-btn" id="syncBtn" onclick="handleSyncClick()">
        <span id="syncIcon">☁️</span>
        <span id="syncLabel">Đồng bộ</span>
      </button>
    </div>

    <!-- PAGE: HOME -->
    <div id="pageHome">
      <div class="summary">
        <div class="sum-card">
          <div class="label">Hôm nay</div>
          <div class="amount today" id="todayTotal">0₫</div>
          <div class="count" id="todayCount">0 khoản</div>
        </div>
        <div class="sum-card">
          <div class="label">Tháng này</div>
          <div class="amount" id="monthTotal">0₫</div>
          <div class="count" id="monthCount">0 khoản</div>
        </div>
      </div>

      <div class="cat-section" id="catSection" style="display: none">
        <div class="sec-title">Tháng này theo danh mục</div>
        <div class="cat-bars" id="catBars"></div>
      </div>

      <!-- FIX #3: chips are <button> elements -->
      <div class="filter-bar" id="filterBar">
        <button
          class="chip active"
          data-cat="All"
          onclick="setFilter('All', this)"
        >
          Tất cả
        </button>
        <button
          class="chip"
          data-cat="🍜 Ăn uống"
          onclick="setFilter('🍜 Ăn uống', this)"
        >
          🍜 Ăn uống
        </button>
        <button
          class="chip"
          data-cat="🛵 Di chuyển"
          onclick="setFilter('🛵 Di chuyển', this)"
        >
          🛵 Di chuyển
        </button>
        <button
          class="chip"
          data-cat="🛍️ Mua sắm"
          onclick="setFilter('🛍️ Mua sắm', this)"
        >
          🛍️ Mua sắm
        </button>
        <button
          class="chip"
          data-cat="💡 Hóa đơn"
          onclick="setFilter('💡 Hóa đơn', this)"
        >
          💡 Hóa đơn
        </button>
        <button
          class="chip"
          data-cat="💊 Sức khỏe"
          onclick="setFilter('💊 Sức khỏe', this)"
        >
          💊 Sức khỏe
        </button>
        <button
          class="chip"
          data-cat="📦 Khác"
          onclick="setFilter('📦 Khác', this)"
        >
          📦 Khác
        </button>
      </div>

      <div class="list-section" id="expenseList"></div>
    </div>

    <!-- PAGE: STATS -->
    <div id="pageStats" class="hidden">
      <div class="page" id="statsContent"></div>
    </div>

    <!-- BOTTOM BAR — z-index 400, always above overlay -->
    <div class="bottom-bar">
      <!-- FIX #6: nav-items are <button> elements -->
      <button class="nav-item active" id="navHome" onclick="showPage('home')">
        <span class="nav-icon">📋</span>
        Giao dịch
      </button>
      <button class="fab" onclick="openAddSheet()">＋</button>
      <button class="nav-item" id="navStats" onclick="showPage('stats')">
        <span class="nav-icon">📊</span>
        Thống kê
      </button>
    </div>

    <!-- OVERLAY — z-index 200 -->
    <div class="overlay" id="overlay" onclick="handleOverlayClick(event)"></div>

    <!-- ADD EXPENSE SHEET — z-index 300 -->
    <div class="sheet" id="addSheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <h2>Thêm chi tiêu</h2>

      <div class="field">
        <label>Số tiền</label>
        <div class="amount-wrap">
          <!-- FIX #8: type=text + inputmode=numeric avoids iOS spinner and zoom -->
          <input
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            id="inputAmount"
            placeholder="0"
            autocomplete="off"
          />
          <span class="currency">₫</span>
        </div>
      </div>

      <div class="field">
        <label>Danh mục</label>
        <div class="cat-grid" id="catGrid"></div>
      </div>

      <div class="field">
        <label>Ghi chú</label>
        <input
          type="text"
          id="inputNote"
          placeholder="Mô tả ngắn…"
          maxlength="80"
          autocomplete="off"
        />
      </div>

      <div class="field">
        <label>Ngày</label>
        <input type="date" id="inputDate" />
      </div>

      <button class="add-btn" onclick="addExpense()">Thêm chi tiêu</button>
    </div>

    <!-- AUTH SHEET — z-index 300 -->
    <div class="sheet" id="authSheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      <div class="auth-sheet">
        <div class="logo">☁️</div>
        <h3>Đồng bộ Google Drive</h3>
        <p>
          Đăng nhập để lưu dữ liệu lên Google Drive.<br />Dữ liệu chỉ lưu trong
          tài khoản của bạn.
        </p>
        <div id="g_id_signin_btn"></div>
      </div>
    </div>

    <!-- TOAST — z-index 500 -->
    <div class="toast" id="toast"></div>

    <script>
      // ═══════════════════════════════════════════════════════
      //  CONFIG — thay YOUR_GOOGLE_CLIENT_ID_HERE bằng Client ID
      // ═══════════════════════════════════════════════════════
      const GAPI_CLIENT_ID =
        "214566412544-vn4darjbmf81nqi9o3u3ec2f92bm6hmn.apps.googleusercontent.com";
      const DRIVE_FILE_NAME = "chi-tieu-data.json";

      // ═══════════════════════════════════════════════════════
      //  CATEGORIES
      // ═══════════════════════════════════════════════════════
      const CATEGORIES = [
        { key: "🍜 Ăn uống", emoji: "🍜", label: "Ăn uống", color: "#F85149" },
        {
          key: "🛵 Di chuyển",
          emoji: "🛵",
          label: "Di chuyển",
          color: "#D29922",
        },
        { key: "🛍️ Mua sắm", emoji: "🛍️", label: "Mua sắm", color: "#BC8CFF" },
        { key: "💡 Hóa đơn", emoji: "💡", label: "Hóa đơn", color: "#58A6FF" },
        {
          key: "💊 Sức khỏe",
          emoji: "💊",
          label: "Sức khỏe",
          color: "#3FB950",
        },
        { key: "📦 Khác", emoji: "📦", label: "Khác", color: "#8B949E" },
      ];
      const catColor = (k) =>
        (CATEGORIES.find((c) => c.key === k) || {}).color || "#8B949E";
      const catEmoji = (k) =>
        (CATEGORIES.find((c) => c.key === k) || {}).emoji || "📦";

      // ═══════════════════════════════════════════════════════
      //  STATE
      // ═══════════════════════════════════════════════════════
      let expenses = JSON.parse(localStorage.getItem("expenses") || "[]");
      let activeFilter = "All";
      let accessToken = null;
      let driveFileId = null;

      // ═══════════════════════════════════════════════════════
      //  INIT
      // ═══════════════════════════════════════════════════════
      window.addEventListener("load", () => {
        buildCatGrid();
        setTodayDate();
        renderAll();
      });

      // ═══════════════════════════════════════════════════════
      //  GOOGLE OAUTH
      // ═══════════════════════════════════════════════════════
      function initOAuthFlow() {
        if (GAPI_CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID_HERE") {
          showToast("Cần cài Google Client ID trước", "error");
          openAuthSheet();
          return;
        }
        const client = google.accounts.oauth2.initTokenClient({
          client_id: GAPI_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/drive.appdata",
          callback: (res) => {
            if (res.error) {
              setSyncState("error", "Lỗi");
              showToast("Đăng nhập thất bại", "error");
              return;
            }
            accessToken = res.access_token;
            setSyncState("syncing", "Đang tải…");
            syncFromDrive();
          },
        });
        client.requestAccessToken();
      }

      // ═══════════════════════════════════════════════════════
      //  GOOGLE DRIVE
      // ═══════════════════════════════════════════════════════
      async function driveRequest(method, url) {
        const res = await fetch(url, {
          method,
          headers: { Authorization: `Bearer ${accessToken}` },
        });
        if (!res.ok) throw new Error(res.status);
        return res.json();
      }

      async function driveUpload(content) {
        const boundary = "chiti3u_b0undary";
        const meta = driveFileId
          ? {}
          : { name: DRIVE_FILE_NAME, parents: ["appDataFolder"] };
        const body = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(content)}\r\n--${boundary}--`;
        const url = driveFileId
          ? `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`
          : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        const res = await fetch(url, {
          method: driveFileId ? "PATCH" : "POST",
          headers: {
            Authorization: `Bearer ${accessToken}`,
            "Content-Type": `multipart/related; boundary=${boundary}`,
          },
          body,
        });
        if (!res.ok) throw new Error(res.status);
        return res.json();
      }

      async function syncFromDrive() {
        try {
          const list = await driveRequest(
            "GET",
            `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${DRIVE_FILE_NAME}'&fields=files(id)`,
          );
          if (list.files && list.files.length > 0) {
            driveFileId = list.files[0].id;
            const res = await fetch(
              `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
              { headers: { Authorization: `Bearer ${accessToken}` } },
            );
            const data = await res.json();
            if (Array.isArray(data.expenses)) {
              expenses = data.expenses;
              localStorage.setItem("expenses", JSON.stringify(expenses));
              renderAll();
            }
          }
          setSyncState("synced", "Đã lưu");
          showToast("☁️ Đã đồng bộ", "success");
        } catch {
          setSyncState("error", "Lỗi");
          showToast("Lỗi tải dữ liệu", "error");
        }
      }

      async function syncToDrive() {
        if (!accessToken) {
          initOAuthFlow();
          return;
        }
        setSyncState("syncing", "Đang lưu…");
        try {
          const r = await driveUpload({ expenses });
          driveFileId = r.id;
          setSyncState("synced", "Đã lưu");
          showToast("☁️ Đã lưu lên Drive", "success");
        } catch {
          setSyncState("error", "Lỗi");
          showToast("Không thể lưu", "error");
        }
      }

      function setSyncState(state, label) {
        const btn = document.getElementById("syncBtn");
        const icon = document.getElementById("syncIcon");
        const lbl = document.getElementById("syncLabel");
        btn.className = `sync-btn ${state}`;
        lbl.textContent = label;
        icon.textContent =
          { synced: "✅", syncing: "🔄", error: "❌" }[state] || "☁️";
      }

      function handleSyncClick() {
        accessToken ? syncToDrive() : initOAuthFlow();
      }

      // ═══════════════════════════════════════════════════════
      //  CRUD
      // ═══════════════════════════════════════════════════════
      function addExpense() {
        const rawAmount = document
          .getElementById("inputAmount")
          .value.replace(/[^0-9]/g, "");
        const amount = parseInt(rawAmount, 10);
        const note =
          document.getElementById("inputNote").value.trim() || "Chi tiêu";
        const date = document.getElementById("inputDate").value;
        const selBtn = document.querySelector(".cat-btn.selected");
        const category = selBtn ? selBtn.dataset.cat : "📦 Khác";

        if (!amount || amount <= 0) {
          showToast("Nhập số tiền hợp lệ", "error");
          return;
        }
        if (!date) {
          showToast("Chọn ngày", "error");
          return;
        }

        expenses.unshift({ id: Date.now(), amount, note, date, category });
        localStorage.setItem("expenses", JSON.stringify(expenses));
        closeSheets();
        renderAll();
        showToast("✅ Đã thêm", "success");
        if (accessToken) syncToDrive();

        // Reset form
        document.getElementById("inputAmount").value = "";
        document.getElementById("inputNote").value = "";
        setTodayDate();
      }

      function deleteExpense(id) {
        if (!confirm("Xóa khoản chi tiêu này?")) return;
        expenses = expenses.filter((e) => e.id !== id);
        localStorage.setItem("expenses", JSON.stringify(expenses));
        renderAll();
        if (accessToken) syncToDrive();
        showToast("🗑️ Đã xóa", "success");
      }

      // ═══════════════════════════════════════════════════════
      //  RENDER
      // ═══════════════════════════════════════════════════════
      function fmt(n) {
        if (n >= 1_000_000)
          return (n / 1_000_000).toFixed(1).replace(/\.0$/, "") + "M₫";
        if (n >= 1_000) return Math.round(n / 1_000) + "K₫";
        return n.toLocaleString("vi-VN") + "₫";
      }
      const todayStr = () => new Date().toISOString().split("T")[0];
      const thisMonthStr = () => todayStr().slice(0, 7);

      function renderAll() {
        renderSummary();
        renderCatBars();
        renderList();
      }

      function renderSummary() {
        const t = todayStr(),
          m = thisMonthStr();
        const td = expenses.filter((e) => e.date === t);
        const mo = expenses.filter((e) => e.date.startsWith(m));
        document.getElementById("todayTotal").textContent = fmt(
          td.reduce((s, e) => s + e.amount, 0),
        );
        document.getElementById("todayCount").textContent =
          `${td.length} khoản`;
        document.getElementById("monthTotal").textContent = fmt(
          mo.reduce((s, e) => s + e.amount, 0),
        );
        document.getElementById("monthCount").textContent =
          `${mo.length} khoản`;
      }

      function renderCatBars() {
        const m = thisMonthStr();
        const items = expenses.filter((e) => e.date.startsWith(m));
        if (!items.length) {
          document.getElementById("catSection").style.display = "none";
          return;
        }
        document.getElementById("catSection").style.display = "";
        const totals = {};
        items.forEach((e) => {
          totals[e.category] = (totals[e.category] || 0) + e.amount;
        });
        const grand = items.reduce((s, e) => s + e.amount, 0);
        const max = Math.max(...Object.values(totals));
        document.getElementById("catBars").innerHTML = Object.entries(totals)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 4)
          .map(
            ([cat, amt]) => `
      <div class="cat-row">
        <span class="cat-label">${cat}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${((amt / max) * 100).toFixed(0)}%;background:${catColor(cat)}"></div></div>
        <span class="cat-pct">${((amt / grand) * 100).toFixed(0)}%</span>
      </div>`,
          )
          .join("");
      }

      function renderList() {
        const filtered =
          activeFilter === "All"
            ? expenses
            : expenses.filter((e) => e.category === activeFilter);
        const el = document.getElementById("expenseList");
        if (!filtered.length) {
          el.innerHTML = `<div class="empty-state"><div class="icon">🪙</div><p>Chưa có khoản chi tiêu nào.<br>Nhấn <b>＋</b> để thêm!</p></div>`;
          return;
        }
        const groups = {};
        filtered.forEach((e) => {
          (groups[e.date] = groups[e.date] || []).push(e);
        });
        el.innerHTML = Object.entries(groups)
          .sort((a, b) => b[0].localeCompare(a[0]))
          .map(([date, items]) => {
            const total = items.reduce((s, e) => s + e.amount, 0);
            return `<div class="day-group">
        <div class="day-label"><span>${fmtDate(date)}</span><span>-${fmt(total)}</span></div>
        ${items
          .map(
            (e) => `
          <div class="expense-item">
            <span class="exp-icon">${catEmoji(e.category)}</span>
            <div class="exp-info">
              <div class="exp-note">${escHtml(e.note)}</div>
              <div class="exp-meta">${e.category}</div>
            </div>
            <span class="exp-amount">-${fmt(e.amount)}</span>
            <button class="del-btn" onclick="deleteExpense(${e.id})" aria-label="Xóa">✕</button>
          </div>`,
          )
          .join("")}
      </div>`;
          })
          .join("");
      }

      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function fmtDate(d) {
        const t = todayStr();
        const y = new Date(Date.now() - 86400000).toISOString().split("T")[0];
        if (d === t) return "Hôm nay";
        if (d === y) return "Hôm qua";
        const dt = new Date(d + "T00:00:00");
        return `${dt.getDate()} tháng ${dt.getMonth() + 1}`;
      }

      function renderStats() {
        const m = thisMonthStr();
        const items = expenses.filter((e) => e.date.startsWith(m));
        const totals = {};
        items.forEach((e) => {
          totals[e.category] = (totals[e.category] || 0) + e.amount;
        });
        const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
        const grand = items.reduce((s, e) => s + e.amount, 0);

        const last7 = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(Date.now() - i * 86400000)
            .toISOString()
            .split("T")[0];
          last7.push({
            d,
            sum: expenses
              .filter((e) => e.date === d)
              .reduce((s, e) => s + e.amount, 0),
          });
        }
        const maxDay = Math.max(...last7.map((x) => x.sum), 1);

        document.getElementById("statsContent").innerHTML = `
    <div class="stats-title">📊 Thống kê</div>
    <div class="stat-block">
      <div class="block-label">7 ngày gần nhất</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:70px;margin-bottom:4px">
        ${last7
          .map(
            ({ d, sum }) => `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="flex:1;width:100%;background:var(--border);border-radius:4px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end">
              <div style="background:${sum > 0 ? "var(--red)" : "transparent"};height:${((sum / maxDay) * 100).toFixed(0)}%;border-radius:4px"></div>
            </div>
            <span style="font-size:10px;color:var(--muted)">${new Date(d + "T00:00:00").getDate()}</span>
          </div>`,
          )
          .join("")}
      </div>
    </div>
    <div class="stat-block">
      <div class="block-label">Tháng này theo danh mục</div>
      ${
        sorted.length === 0
          ? '<p style="color:var(--muted);font-size:13px">Chưa có dữ liệu</p>'
          : sorted
              .map(
                ([cat, amt]) => `
          <div class="stat-row">
            <div class="sr-left">${catEmoji(cat)} ${cat}</div>
            <div class="sr-right">${fmt(amt)}</div>
          </div>`,
              )
              .join("") +
            `<div class="stat-row" style="font-weight:700">
          <div class="sr-left" style="color:var(--text)">Tổng cộng</div>
          <div class="sr-right">${fmt(grand)}</div>
        </div>`
      }
    </div>
    <div class="stat-block">
      <div class="block-label">Tổng quan</div>
      <div class="stat-row">
        <div class="sr-left">📅 Ngày có chi tiêu</div>
        <div class="sr-right" style="color:var(--blue)">${new Set(items.map((e) => e.date)).size} ngày</div>
      </div>
      <div class="stat-row">
        <div class="sr-left">🔢 Số giao dịch</div>
        <div class="sr-right" style="color:var(--blue)">${items.length}</div>
      </div>
      <div class="stat-row">
        <div class="sr-left">📈 Trung bình/ngày</div>
        <div class="sr-right" style="color:var(--yellow)">${items.length ? fmt(Math.round(grand / new Date().getDate())) : "0₫"}</div>
      </div>
    </div>`;
      }

      // ═══════════════════════════════════════════════════════
      //  NAVIGATION
      // ═══════════════════════════════════════════════════════
      function showPage(page) {
        document
          .getElementById("pageHome")
          .classList.toggle("hidden", page !== "home");
        document
          .getElementById("pageStats")
          .classList.toggle("hidden", page !== "stats");
        document
          .getElementById("navHome")
          .classList.toggle("active", page === "home");
        document
          .getElementById("navStats")
          .classList.toggle("active", page === "stats");
        if (page === "stats") renderStats();
      }

      // ═══════════════════════════════════════════════════════
      //  SHEET CONTROLS
      // ═══════════════════════════════════════════════════════
      function openAddSheet() {
        document.getElementById("overlay").classList.add("open");
        document.getElementById("addSheet").classList.add("open");
        // FIX #2: no setTimeout — focus immediately in the gesture handler
        document.getElementById("inputAmount").focus();
      }

      function openAuthSheet() {
        if (GAPI_CLIENT_ID !== "YOUR_GOOGLE_CLIENT_ID_HERE" && window.google) {
          google.accounts.id.renderButton(
            document.getElementById("g_id_signin_btn"),
            {
              theme: "filled_black",
              size: "large",
              locale: "vi",
            },
          );
        }
        document.getElementById("overlay").classList.add("open");
        document.getElementById("authSheet").classList.add("open");
      }

      // FIX #9: overlay click only closes if click is directly on overlay (not bubbled from sheet)
      function handleOverlayClick(e) {
        if (e.target === document.getElementById("overlay")) closeSheets();
      }

      function closeSheets() {
        document.getElementById("overlay").classList.remove("open");
        document
          .querySelectorAll(".sheet")
          .forEach((s) => s.classList.remove("open"));
      }

      // ═══════════════════════════════════════════════════════
      //  HELPERS
      // ═══════════════════════════════════════════════════════
      function setFilter(cat, el) {
        activeFilter = cat;
        document
          .querySelectorAll(".chip")
          .forEach((c) => c.classList.remove("active"));
        el.classList.add("active");
        renderList();
      }

      function buildCatGrid() {
        document.getElementById("catGrid").innerHTML = CATEGORIES.map(
          (c) => `
    <button class="cat-btn" data-cat="${c.key}" onclick="selectCat(this)">
      <span class="emoji">${c.emoji}</span>${c.label}
    </button>`,
        ).join("");
        // FIX #10: null-safe first selection
        const first = document.querySelector(".cat-btn");
        if (first) first.classList.add("selected");
      }

      function selectCat(el) {
        document
          .querySelectorAll(".cat-btn")
          .forEach((b) => b.classList.remove("selected"));
        el.classList.add("selected");
      }

      function setTodayDate() {
        document.getElementById("inputDate").value = todayStr();
      }

      let toastTimer;
      function showToast(msg, type) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
      }
    </script>
  </body>
</html>
